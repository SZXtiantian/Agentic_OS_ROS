name: hello_world_agent
version: 0.1.0
description: Template-derived Agentic App that exercises context, memory, storage, tool, skill, and report surfaces.
entrypoint: main:run
permissions:
  - llm.external.call
  - report.say
  - context.write
  - context.read
  - memory.write
  - memory.read
  - storage.read
  - storage.write
  - tool.execute.calculator.add
required_capabilities:
  - agenticos.runtime.llm_chat
  - llm.chat
  - report.say
  - kernel.context
  - kernel.memory
  - kernel.storage
  - kernel.tool
  - kernel.skill
  - calculator.add
safety_policy:
  allow_autonomous_navigation: false
  allow_manipulation: false
  require_human_confirmation_for: []
  forbidden_zones: []
  max_task_duration_s: 60
runtime_limits:
  max_concurrent_tasks: 1
  max_retries_per_skill: 0
  max_memory_write_per_task: 1
  llm_planning_enabled: true
  llm_planning_provider: agenticos.runtime.llm_chat
