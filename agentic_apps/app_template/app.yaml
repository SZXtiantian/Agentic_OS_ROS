name: app_template
version: 0.1.0
description: Template for Agentic OS apps.
entrypoint: main:run
permissions:
  - report.say
  - memory.write
  - memory.read
  - storage.read
  - storage.write
  - tool.execute.calculator.add
required_capabilities:
  - report.say
  - kernel.context
  - kernel.memory
  - kernel.storage
  - calculator.add
safety_policy:
  allow_autonomous_navigation: false
  allow_manipulation: false
  require_human_confirmation_for: []
  forbidden_zones: []
  max_task_duration_s: 60
runtime_limits:
  max_concurrent_tasks: 1
  max_retries_per_skill: 0
  max_memory_write_per_task: 1
  llm_planning_enabled: false
