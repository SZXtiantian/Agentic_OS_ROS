name: robotops_agent
version: 0.1.0
description: Skeleton RobotOps agent.
entrypoint: main:run
permissions:
  - report.say
required_capabilities:
  - report.say
safety_policy:
  allow_autonomous_navigation: false
  allow_manipulation: false
  require_human_confirmation_for: []
  forbidden_zones: []
  max_task_duration_s: 60
runtime_limits:
  max_concurrent_tasks: 1
  max_retries_per_skill: 0
  max_memory_write_per_task: 1
  llm_planning_enabled: false
