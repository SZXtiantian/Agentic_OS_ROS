[pytest]
testpaths =
    agentic_runtime_src/tests
    agentic_apps
pythonpath =
    agentic_runtime_src
    agentic_runtime_src/tests
addopts =
    --import-mode=importlib
    -p no:cacheprovider
markers =
    portable: no network, no ROS2, no hardware
    integration: opt-in real integration contracts; skip as UNVERIFIED when real dependencies are absent
    ros2: requires ROS2 environment
    hardware: requires real robot hardware
