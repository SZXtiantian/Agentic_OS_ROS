safety:
  require_estop_released: true
  max_linear_speed_mps: 0.5
  max_angular_speed_radps: 0.8
  max_navigation_duration_s: 120
  max_task_duration_s: 300
  forbidden_zones:
    - stairs
    - elevator
    - lab_restricted_zone
  require_permission_check: true
  require_resource_lock: true
  require_safety_guard: true
  require_audit_log: true
  camera:
    allowed_targets:
      - workspace
      - arm_workspace
      - desk
    max_observe_duration_s: 60
    max_capture_duration_s: 20
  manipulation:
    max_arm_duration_s: 8
    allowed_named_actions:
      - arm_home
      - camera_center
      - camera_yaw_left_15
      - camera_yaw_right_15
      - camera_pitch_up_15
    allowed_gripper_commands:
      - open
      - close
    allowed_gripper_forces:
      - low
    workspace_bounds_m:
      x: [0.12, 0.32]
      y: [-0.18, 0.18]
      z: [0.05, 0.36]
    gripper_pulse_limits:
      min_pulse: 350
      max_pulse: 760
