profile_name: rosorin_arm_camera
robot_id: rosorin_real_robot
ros_domain_id: 0
evidence:
  directory: /opt/agentic/var/evidence
camera:
  mode: rgb_depth_optional
  primary_rgb_topic: /depth_cam/rgb0/image_raw
  fallback_rgb_topics:
    - /camera/color/image_raw
  camera_info_topics:
    - /depth_cam/depth0/camera_info
    - /camera/color/camera_info
    - /depth_cam/rgb0/camera_info
  depth_topics:
    - /depth_cam/depth0/image_raw
    - /camera/depth/image_raw
  point_cloud_topics:
    - /depth_cam/depth0/points
    - /camera/depth/points
  frame_freshness_s: 5.0
  observe_timeout_s: 5
perception:
  backend_type: camera_metadata
  detection_topic: ""
  detection_type: interfaces/msg/ObjectsInfo
arm:
  backend_type: servo_action_group
  action_command_topic: /servo_controller
  action_status_service: ""
  action_group_path: /home/ubuntu/software/arm_pc/ActionGroups
  servo_command_topic: /servo_controller
  kinematics_pose_service: /kinematics/set_pose_target
  max_duration_s: 8
  allowed_named_actions:
    arm_home:
      backend: servo_action_group
      backend_action: init
      duration_s: 5
      description: Return arm to the vendor init action group file.
    camera_center:
      backend: servo_action_group
      backend_action: horizontal
      duration_s: 5
      description: Move camera to the center/horizontal vendor action group.
    camera_yaw_left_15:
      backend: servo_action_group
      backend_action: detect_left
      duration_s: 5
      description: Move camera to the left inspection action group.
    camera_yaw_right_15:
      backend: servo_action_group
      backend_action: detect_right
      duration_s: 5
      description: Move camera to the right inspection action group.
    camera_pitch_up_15:
      backend: servo_action_group
      backend_action: camera_up
      duration_s: 5
      description: Move camera to the upward inspection action group.
  workspace_bounds_m:
    x: [0.12, 0.32]
    y: [-0.18, 0.18]
    z: [0.03, 0.36]
  joint_pulse_limits:
    joint1: [0, 1000]
    joint2: [0, 1000]
    joint3: [0, 1000]
    joint4: [0, 1000]
    joint5: [0, 1000]
    r_joint: [0, 1000]
  stop_backend:
    type: action_group_controller.stop_action_group
    reason: AgenticOS bridge owns the vendor ActionGroupController instance while an action is active.
gripper:
  backend_type: servo_controller
  servo_command_topic: /servo_controller
  servo_id: 10
  position_unit: pulse
  duration_s: 0.6
  limits:
    min_pulse: 150
    max_pulse: 760
    open_pulse: 200
    close_low_force_pulse: 650
  allowed_commands:
    open_gripper:
      command: open
      pulse: 200
      force: low
    close_gripper_low_force:
      command: close
      pulse: 650
      force: low
color_block:
  lab_ranges:
    red:
      min: [0, 152, 108]
      max: [255, 255, 255]
    blue:
      min: [50, 116, 100]
      max: [120, 130, 116]
    green:
      min: [90, 90, 126]
      max: [230, 120, 150]
  detect_roi_x_max_ratio: 0.78
  detect_roi_y_min_ratio: 0.08
  min_area_px: 50
  held_verify_roi_x_min_ratio: 0.20
  held_verify_roi_x_max_ratio: 0.92
  held_verify_roi_y_min_ratio: 0.72
  held_verify_roi_y_max_ratio: 1.0
  held_verify_min_area_px: 80
  held_verify_min_confidence: 0.001
  held_verify_pre_pick_exclusion_radius_px: 45
  held_verify_min_radius_ratio_vs_pre_pick: 1.15
  held_verify_min_depth_delta_m: 0.09
  held_verify_min_center_y_ratio: 0.82
  held_verify_min_bottom_y_ratio: 0.90
  center_timeout_s: 8.0
  center_target_x_ratio: 0.52
  center_target_y_ratio: 0.78
  center_tolerance_ratio: 0.045
  center_base_start_pulse: 500
  center_pitch_start_pulse: 188
  center_base_pulse_limits: [440, 560]
  center_pitch_pulse_limits: [120, 260]
  center_base_gain: -100.0
  center_pitch_gain: 50.0
  center_max_servo_step: 8
  center_max_iterations: 18
  center_servo_duration_s: 0.08
  center_settle_s: 0.20
  roi_radius_px: 5
  depth_roi_radius_scale: 1.0
  object_radius_compensation_m: 0.02
  depth_error_compensation_m: 0.025
  max_distance_m: 0.38
  hand2cam_tx_m: -0.101
  hand2cam_ty_m: 0.0
  hand2cam_tz_m: 0.037
  pick_x_offset_m: 0.012
  pick_y_offset_m: 0.027
  pick_z_offset_m: 0.094
  pregrasp_height_m: 0.04
  lift_height_m: 0.08
  pick_pitch_near: 76.0
  pick_pitch_far: 30.0
  near_z_threshold_m: 0.20
  pitch_range_min: -180.0
  pitch_range_max: 180.0
  pitch_resolution: 1.0
  gripper_open: 150
  gripper_close: 650
  pick_move_duration_s: 2.6
  pick_settle_s: 3.2
  pick_execution_strategy: ik_color_block_pick
  fixed_pick_sequence:
    - status: opening_gripper
      progress: 0.30
      duration_s: 0.6
      settle_s: 0.7
      positions: [[10, 200]]
    - status: moving_fixed_pick
      progress: 0.62
      duration_s: 2.0
      settle_s: 2.2
      positions: [[1, 500], [2, 100], [3, 450], [4, 230], [5, 500], [10, 200]]
    - status: closing_gripper
      progress: 0.78
      duration_s: 0.8
      settle_s: 1.4
      positions: [[10, 540]]
    - status: lifting
      progress: 0.92
      duration_s: 1.5
      settle_s: 1.6
      positions: [[1, 500], [2, 650], [3, 15], [4, 260], [5, 500], [10, 540]]
discovered_interfaces:
  camera_launch:
    - /home/ubuntu/ros2_ws/src/peripherals/launch/depth_camera.launch.py
    - /home/ubuntu/ros2_ws/src/peripherals/launch/usb_cam.launch.py
  candidate_camera_topics:
    - /depth_cam/rgb0/image_raw
    - /depth_cam/depth0/image_raw
    - /depth_cam/depth0/points
    - /depth_cam/ir0/image_raw
    - /camera/color/image_raw
    - /camera/depth/image_raw
    - /camera/depth/points
  arm_topics:
    - /servo_controller
    - /joint_controller
    - /ros_robot_controller/bus_servo/set_position
  arm_services:
    - /init_pose/init_finish
    - /ros_robot_controller/bus_servo/get_state
    - /claw_arm_group_control/arm_group_status
    - /kinematics/set_pose_target
  message_types:
    servo_position: servo_controller_msgs/msg/ServosPosition
    kinematics_pose: kinematics_msgs/srv/SetRobotPose
  action_group_files:
    - /home/ubuntu/software/arm_pc/ActionGroups/init.d6a
    - /home/ubuntu/software/arm_pc/ActionGroups/horizontal.d6a
    - /home/ubuntu/software/arm_pc/ActionGroups/detect_left.d6a
    - /home/ubuntu/software/arm_pc/ActionGroups/detect_right.d6a
    - /home/ubuntu/software/arm_pc/ActionGroups/camera_up.d6a
    - /home/ubuntu/software/arm_pc/ActionGroups/left_down.d6a
  optional_vendor_nodes_not_running_in_current_graph:
    - /claw_arm_group_control
