name: perception.verify_held_color_block
version: 0.1.0
description: Independently verify a picked colored block is visible in the gripper-held ROI through the Agentic perception bridge.
input_schema:
  type: object
  required: [color, detection, pick_result]
  properties:
    color:
      type: string
      enum: [red, green, blue, yellow]
    target:
      type: string
    detection:
      type: object
    pick_result:
      type: object
    evidence_label:
      type: string
    timeout_s:
      type: integer
      minimum: 1
      maximum: 30
output_schema:
  type: object
  required: [success, verified_held]
  properties:
    success:
      type: boolean
    verified_held:
      type: boolean
    verification:
      type: object
    evidence:
      type: object
    error_code:
      type: string
    reason:
      type: string
permission_requirements:
  - perception.verify.color_block_held
resource_requirements:
  locks:
    - camera
    - color_block_detector
safety_constraints:
  require_estop_released: false
  camera_target_allowlist: true
  allow_cancel: true
  max_duration_s: 30
  runtime_timeout_margin_s: 5
timeout_s: 30
retry_policy:
  max_attempts: 0
  retry_on: []
backend:
  type: ros2_service
  bridge: inspection_bridge_node
  service: /agentic/perception/verify_held_color_block
  service_type: agentic_msgs/srv/VerifyHeldColorBlock
  availability: real_bridge_required
observability:
  audit: true
  record_feedback: false
  record_result: true
