name: manipulation.pick_color_block
version: 0.1.0
description: Pick a detected colored block through the Agentic manipulation bridge.
input_schema:
  type: object
  required: [color]
  properties:
    color:
      type: string
      enum: [red, green, blue, yellow]
    target:
      type: string
    detection:
      type: object
    evidence:
      type: object
    timeout_s:
      type: integer
      minimum: 1
      maximum: 60
output_schema:
  type: object
  required: [success]
  properties:
    success:
      type: boolean
    result:
      type: object
    error_code:
      type: string
    reason:
      type: string
permission_requirements:
  - manipulation.pick.color_block
resource_requirements:
  locks:
    - arm
    - gripper
    - camera
    - manipulation_backend
safety_constraints:
  require_estop_released: true
  workspace_bounds_check: true
  allow_cancel: true
  max_duration_s: 60
  runtime_timeout_margin_s: 5
timeout_s: 60
retry_policy:
  max_attempts: 0
  retry_on: []
backend:
  type: ros2_action
  bridge: manipulation_bridge_node
  action: /agentic/manipulation/pick_color_block
  action_type: agentic_msgs/action/PickColorBlock
  availability: real_bridge_required
observability:
  audit: true
  record_feedback: true
  record_result: true
