name: perception.capture_photo
version: 0.1.0
description: Capture and persist a real camera photo through the AgenticOS camera bridge.
input_schema:
  type: object
  required: [target]
  properties:
    target:
      type: string
    label:
      type: string
    timeout_s:
      type: integer
      minimum: 1
      maximum: 20
output_schema:
  type: object
  required: [success]
  properties:
    success:
      type: boolean
    image_path:
      type: string
    metadata_path:
      type: string
    evidence:
      type: object
permission_requirements:
  - perception.capture
resource_requirements:
  locks:
    - camera
safety_constraints:
  require_estop_released: false
  camera_target_allowlist: true
  allow_cancel: true
  max_duration_s: 20
  runtime_timeout_margin_s: 5
timeout_s: 20
retry_policy:
  max_attempts: 0
  retry_on: []
backend:
  type: ros2_service
  bridge: inspection_bridge_node
  service: /agentic/perception/capture_photo
observability:
  audit: true
  record_feedback: false
  record_result: true
