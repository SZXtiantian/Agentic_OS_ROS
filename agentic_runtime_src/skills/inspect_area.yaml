name: robot.inspect_area
version: 0.1.0
description: Inspect a registered place and return a summary.
input_schema:
  type: object
  required: [place]
  properties:
    place:
      type: string
    timeout_s:
      type: integer
      minimum: 1
      maximum: 120
output_schema:
  type: object
  required: [success, summary]
  properties:
    success:
      type: boolean
    summary:
      type: string
    objects:
      type: array
    anomalies:
      type: array
permission_requirements:
  - perception.inspect
resource_requirements:
  locks:
    - camera
safety_constraints:
  require_known_place: true
  require_estop_released: false
  allow_cancel: true
timeout_s: 60
retry_policy:
  max_attempts: 0
  retry_on: []
backend:
  type: ros2_service
  bridge: inspection_bridge_node
  service: /agentic/perception/inspect_area
observability:
  audit: true
  record_feedback: false
  record_result: true
