name: robot.stop
version: 0.1.0
description: Stop robot immediately through safety guard.
input_schema:
  type: object
  required: []
  properties:
    reason:
      type: string
output_schema:
  type: object
  required: [success]
  properties:
    success:
      type: boolean
    message:
      type: string
permission_requirements:
  - robot.stop
resource_requirements:
  locks: []
safety_constraints:
  highest_priority: true
  bypass_normal_queue: true
  audit_required: true
  allow_cancel: false
timeout_s: 10
retry_policy:
  max_attempts: 0
  retry_on: []
backend:
  type: ros2_service
  bridge: safety_guard_node
  service: /agentic/robot/stop
observability:
  audit: true
  record_feedback: false
  record_result: true
