name: arm.get_state
version: 0.1.0
description: Read AgenticOS arm readiness and active action state.
input_schema:
  type: object
  required: []
  properties: {}
output_schema:
  type: object
  required: [success, state]
  properties:
    success:
      type: boolean
    state:
      type: object
permission_requirements:
  - arm.state.read
resource_requirements:
  locks: []
safety_constraints:
  require_estop_released: false
  allow_cancel: false
timeout_s: 5
retry_policy:
  max_attempts: 0
  retry_on: []
backend:
  type: ros2_service
  bridge: manipulation_bridge_node
  service: /agentic/arm/get_state
observability:
  audit: true
  record_feedback: false
  record_result: true
