name: robot.get_state
version: 0.1.0
description: Get current robot state.
input_schema:
  type: object
  required: []
  properties: {}
output_schema:
  type: object
  required: [success, state]
  properties:
    success:
      type: boolean
    state:
      type: object
permission_requirements:
  - robot.state.read
resource_requirements:
  locks: []
safety_constraints:
  require_estop_released: false
  allow_cancel: false
timeout_s: 10
retry_policy:
  max_attempts: 0
  retry_on: []
backend:
  type: ros2_service
  bridge: state_bridge_node
  service: /agentic/robot/get_state
observability:
  audit: true
  record_feedback: false
  record_result: true
